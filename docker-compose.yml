version: '3.8'

services:
  backend:
    build:
      context: ../Backend
      dockerfile: Dockerfile
    container_name: streamline-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - streamline-network

  frontend:
    build:
      context: ../Frontend
      dockerfile: Dockerfile
    container_name: streamline-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - streamline-network

  db:
    image: postgres:15-alpine
    container_name: streamline-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=streamline
    volumes:
      - streamline_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - streamline-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  streamline_postgres_data:

networks:
  streamline-network:
    driver: bridge
