name: Deploy to Azure VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 300s
          command_timeout: 30m
          script: |
            # Add swap if not already added
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi

            # Pull latest code
            cd ~/Backend && git pull
            cd ~/Frontend && git pull
            cd ~/DevOps && git pull

            # Write fresh .env from secrets
            cat > ~/DevOps/.env << EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            DOMAIN=${{ secrets.DUCKDNS_DOMAIN }}.duckdns.org
            VM_IP=${{ secrets.VM_HOST }}
            SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}
            FROM_EMAIL=${{ secrets.FROM_EMAIL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
            NEXT_PUBLIC_API_URL=https://${{ secrets.DUCKDNS_DOMAIN }}.duckdns.org/api
            NEXT_PUBLIC_USE_MOCK=false
            NEXT_PUBLIC_USE_MOCK_API=false
            GOOGLE_CLIENT_ID_ANDROID=${{ secrets.GOOGLE_CLIENT_ID_ANDROID }}
            GOOGLE_CLIENT_ID_IOS=${{ secrets.GOOGLE_CLIENT_ID_IOS }}
            GOOGLE_CLIENT_ID_WEB=${{ secrets.GOOGLE_CLIENT_ID_WEB }}
            ADMIN_BOOTSTRAP_SECRET=${{ secrets.ADMIN_BOOTSTRAP_SECRET }}
            FACEBOOK_APP_ID=${{ secrets.FACEBOOK_APP_ID }}
            FACEBOOK_APP_SECRET=${{ secrets.FACEBOOK_APP_SECRET }}
            PUBLIC_UPLOAD_BASE_URL=${{ secrets.PUBLIC_UPLOAD_BASE_URL }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            EOF

            # Setup DuckDNS
            mkdir -p ~/duckdns
            cat > ~/duckdns/duck.sh << EOF
            echo url="https://www.duckdns.org/update?domains=${{ secrets.DUCKDNS_DOMAIN }}&token=${{ secrets.DUCKDNS_TOKEN }}&ip=${{ secrets.VM_HOST }}" | curl -k -o ~/duckdns/duck.log -K -
            EOF
            chmod +x ~/duckdns/duck.sh

            # Add to cron if not already there
            (crontab -l 2>/dev/null | grep -q duckdns) || \
            (crontab -l 2>/dev/null; echo "*/5 * * * * ~/duckdns/duck.sh >/dev/null 2>&1") | crontab -

            # Backup uploads before deploy
            docker cp streamline-backend:/app/app/uploads ~/uploads-backup-$(date +%Y%m%d) 2>/dev/null || true

            # Clear Docker cache
            docker builder prune -f

            # Stop containers without wiping volumes
            cd ~/DevOps
            docker compose down

            # Build and start one at a time
            docker compose build backend
            docker compose up -d backend
            sleep 15

            # Verify uploads directory exists
            docker compose exec backend ls /app/app/uploads && \
              echo "✅ Uploads directory verified" || \
              echo "⚠️ Uploads directory not found"

            docker compose build frontend
            docker compose up -d frontend
            sleep 5
            docker compose up -d nginx
            docker compose up -d netdata

            docker compose ps
