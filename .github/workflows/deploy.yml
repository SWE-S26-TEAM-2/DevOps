name: Deploy to Azure VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 300s
          command_timeout: 30m
          script: |
            # Pull latest code safely
            cd ~/Backend && git pull
            cd ~/Frontend && git pull
            cd ~/DevOps && git pull

            # Always write fresh .env from secrets
            cat > ~/DevOps/.env << 'EOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            VM_IP=${{ secrets.VM_HOST }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            
            EOF

            cd ~/DevOps

            # Clear Docker cache to avoid snapshot errors
            docker builder prune -f

            # Stop everything
            docker compose down

            # Build and start one at a time
            docker compose build backend
            docker compose up -d backend
            sleep 15
            docker compose build frontend
            docker compose up -d frontend
            docker compose up -d nginx
            docker compose up -d netdata
            
            

            # Show status
            docker compose ps
